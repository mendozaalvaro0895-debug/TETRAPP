<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRAPLASTIC — Dashboard · Producción</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #F7F6F2; color: #0C0C0B; min-height: 100vh; }

.topbar { background: #0C0C0B; padding: 10px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #1E7D6A; flex-wrap: wrap; gap: 10px; }
.logo { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 900; color: #fff; }
.logo span { color: #7ECEC0; }
.nav-btns { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; text-decoration: none; }
.nav-btn:hover { background: rgba(255,255,255,.22); }

.page { max-width: 1280px; margin: 0 auto; padding: 24px; }
.page-title { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #6B6B6A; margin-bottom: 24px; }

.period-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
.period-btn { background: #fff; border: 1.5px solid #E0DED8; color: #6B6B6A; padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; }
.period-btn:hover { border-color: #1A6B5B; color: #1A6B5B; }
.period-btn.active { background: #1A6B5B; border-color: #1A6B5B; color: #fff; }
.period-sep { width: 1px; height: 28px; background: #E0DED8; }
.nav-group { display: flex; align-items: center; gap: 6px; background: #fff; border: 1.5px solid #E0DED8; border-radius: 20px; padding: 4px 6px; }
.nav-arrow { background: none; border: none; cursor: pointer; font-size: 14px; color: #6B6B6A; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.nav-arrow:hover { background: #EBF7F4; color: #1A6B5B; }
.nav-label { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; color: #0C0C0B; padding: 0 6px; min-width: 140px; text-align: center; white-space: nowrap; }
.period-picker { padding: 6px 12px; border: 1.5px solid #E0DED8; border-radius: 20px; font-size: 12px; font-family: 'DM Sans', sans-serif; color: #0C0C0B; background: #fff; cursor: pointer; outline: none; transition: border-color .15s; }
.period-picker:hover, .period-picker:focus { border-color: #1A6B5B; }
.today-chip { background: #EBF7F4; border: 1.5px solid #C8EDE7; color: #1A6B5B; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: all .15s; }
.today-chip:hover { background: #1A6B5B; color: #fff; border-color: #1A6B5B; }

.kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.kpi-card { background: #fff; border: 1.5px solid #E0DED8; border-radius: 12px; padding: 16px; }
.kpi-card.highlight { background: #0C0C0B; border-color: #0C0C0B; }
.kpi-val { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 700; line-height: 1; }
.kpi-card.highlight .kpi-val { color: #7ECEC0; }
.kpi-lbl { font-size: 11px; color: #6B6B6A; margin-top: 4px; font-weight: 600; text-transform: uppercase; }
.kpi-sub { font-size: 10px; color: #A8A6A0; margin-top: 2px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 24px; }
.card { background: #fff; border: 1.5px solid #E0DED8; border-radius: 14px; padding: 20px; }
.sec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.sec-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.sec-tag { font-size: 10px; font-weight: 700; color: #1A6B5B; background: #EBF7F4; padding: 4px 10px; border-radius: 20px; }

.rank-item { border-bottom: 1px solid #E0DED8; }
.rank-item:last-child { border-bottom: none; }
.ranking-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; cursor: pointer; border-radius: 8px; transition: background .12s; }
.ranking-row:hover { background: #F7F6F2; padding-left: 6px; padding-right: 6px; margin: 0 -6px; }
.ranking-row.expanded { background: #EBF7F4; padding-left: 6px; padding-right: 6px; margin: 0 -6px; border-radius: 8px 8px 0 0; }
.rank-medal { font-size: 16px; width: 24px; text-align: center; }
.rank-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.rank-info { flex: 1; min-width: 0; }
.rank-name { font-size: 13px; font-weight: 600; }
.rank-cmds { font-size: 10px; color: #6B6B6A; }
.rank-bar-wrap { flex: 1; background: #F7F6F2; border-radius: 4px; height: 6px; }
.rank-bar { height: 6px; border-radius: 4px; background: #1A6B5B; width: 0%; }
.rank-und { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; color: #1A6B5B; min-width: 80px; text-align: right; }
.rank-chevron { font-size: 12px; color: #A8A6A0; transition: transform .2s; width: 16px; text-align: center; flex-shrink: 0; }
.rank-chevron.open { transform: rotate(180deg); color: #1A6B5B; }

.rank-detail { display: none; background: #F7F9F8; border-radius: 0 0 10px 10px; border: 1px solid #C8EDE7; border-top: none; padding: 14px 16px 10px; margin: 0 -1px 2px; }
.rank-detail.open { display: block; }
.rank-detail-title { font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #1A6B5B; margin-bottom: 10px; }
.det-proc-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #E8F5F2; }
.det-proc-row:last-child { border-bottom: none; }
.det-proc-chip { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; min-width: 100px; text-align: center; flex-shrink: 0; }
.det-proc-bar-wrap { flex: 1; background: #E0EDE9; border-radius: 4px; height: 5px; }
.det-proc-bar { height: 5px; border-radius: 4px; }
.det-proc-und { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; min-width: 74px; text-align: right; flex-shrink: 0; }
.det-proc-meta { font-size: 10px; color: #A8A6A0; min-width: 52px; text-align: right; flex-shrink: 0; }

.proc-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #E0DED8; }
.proc-chip { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; min-width: 90px; text-align: center; }
.proc-bar-wrap { flex: 1; background: #F7F6F2; border-radius: 4px; height: 6px; }
.proc-bar { height: 6px; border-radius: 4px; width: 0%; }
.proc-und { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; min-width: 70px; text-align: right; }
.proc-tareas { font-size: 10px; color: #A8A6A0; min-width: 55px; text-align: right; }

.historial-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #F7F6F2; border-radius: 10px; cursor: pointer; margin-bottom: 12px; }
.historial-header:hover { background: #EBF7F4; }
.toggle-icon { font-size: 14px; transition: transform .2s; color: #1A6B5B; }
.toggle-icon.rotated { transform: rotate(180deg); }
.historial-body { display: none; overflow-x: auto; }
.historial-body.open { display: block; }
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #6B6B6A; padding: 8px 10px; border-bottom: 2px solid #E0DED8; text-align: left; }
.hist-table td { padding: 10px; border-bottom: 1px solid #E0DED8; font-size: 12px; cursor: pointer; }
.hist-table tr:hover td { background: #F7F6F2; }
.ver-mas-btn { background: none; border: none; color: #1A6B5B; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 12px; padding: 10px; width: 100%; text-align: center; border-top: 1px solid #E0DED8; }
.ver-mas-btn:hover { background: #EBF7F4; border-radius: 0 0 14px 14px; }

.loading { text-align: center; padding: 40px; color: #6B6B6A; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #C8EDE7; border-top-color: #1A6B5B; border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px; color: #6B6B6A; font-size: 13px; }
</style>

<div class="topbar">
  <div class="logo">TETRA<span>PLASTIC</span></div>
  <div class="nav-btns">
    <a href="tapas.html" class="nav-btn">🏷 Tapas</a>
    <a href="serigrafia.html" class="nav-btn">🎨 Serigrafía</a>

    <a href="index.html" class="nav-btn">🏠 Inicio</a>
  </div>
</div>

<div class="page">
  <div class="page-title">📊 Dashboard · Producción</div>
  <div class="page-sub" id="pageSubLabel">Cargando datos...</div>

  <div class="period-bar">
    <button class="period-btn" data-p="hoy" onclick="setPeriod('hoy')">Día</button>
    <button class="period-btn" data-p="semana" onclick="setPeriod('semana')">Semana</button>
    <button class="period-btn active" data-p="mes" onclick="setPeriod('mes')">Mes</button>
    <div class="period-sep"></div>
    <div class="nav-group">
      <button class="nav-arrow" onclick="navPeriod(-1)" title="Período anterior">‹</button>
      <span class="nav-label" id="periodDateLabel">—</span>
      <button class="nav-arrow" onclick="navPeriod(1)" title="Período siguiente">›</button>
    </div>
    <input class="period-picker" type="month" id="periodPicker" onchange="pickerChanged(this.value)" title="Ir a un mes específico">

  <div class="kpi-strip" id="kpiStrip">
    <div class="kpi-card loading"><div class="spinner"></div><div class="kpi-lbl">Cargando...</div></div>

    <div class="kpi-card loading"><div class="spinner"></div><div class="kpi-lbl">Cargando...</div></div>
    <div class="kpi-card loading"><div class="spinner"></div><div class="kpi-lbl">Cargando...</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="sec-header"><div class="sec-title">🏆 Ranking · Operarios</div><div class="sec-tag">por unidades PT</div></div>
      <div id="rankingContent"><div class="loading"><div class="spinner"></div></div></div>
    </div>
    <div class="card">
      <div class="sec-header"><div class="sec-title">🔧 Procesos</div><div class="sec-tag">distribución</div></div>
      <div id="procesosContent"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <div class="card">
    <div class="sec-header"><div class="sec-title">📋 Historial de Comandas</div><div class="sec-tag" id="histCount">—</div></div>
    <div id="historialContent"><div class="loading"><div class="spinner"></div></div></div>

</div>

<script>
const SUPA_URL = 'https://rohdxjuuvpgrhevfsrye.supabase.co';
const SUPA_KEY = 'sb_publishable_PayfE36QRzwOnP6zA2TDSQ_oj4vnB5i';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

let periodo = 'mes';
let fechaRef = new Date();       // fecha de referencia navegable
let comandas = [];
let historialLimit = 10;
let historialOpen = true;
let expandedOp = null;           // id del operario con detalle abierto

const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const OP_COLORS = { 'T0':'#0D4035','T1':'#1A6B5B','T2':'#2E86AB','T3':'#A23B72','T4':'#F18F01','T5':'#C73E1D','T6':'#3B1F2B','T7':'#44BBA4','T8':'#E94F37','T9':'#393E41' };
const PROC_COLORS = { 'Armado':'#1A6B5B','Banda':'#B07D2A','Liner':'#4338CA','Impresión':'#9D174D','Encajado':'#166534','Flameado':'#0369A1','Otra tarea':'#6B6B6A' };

// ── Helpers de fecha ─────────────────────────────────────────
const fmt = d => d.toISOString().split('T')[0];

function getFechas() {
  const r = new Date(fechaRef);
  if (periodo === 'hoy') {
    return { desde: fmt(r), hasta: fmt(r) };
  }
  if (periodo === 'semana') {
    const lunes = new Date(r);
    lunes.setDate(r.getDate() - ((r.getDay() + 6) % 7));
    const domingo = new Date(lunes);
    domingo.setDate(lunes.getDate() + 6);
    return { desde: fmt(lunes), hasta: fmt(domingo) };
  }
  // mes
  const inicio = new Date(r.getFullYear(), r.getMonth(), 1);
  const fin    = new Date(r.getFullYear(), r.getMonth() + 1, 0);
  return { desde: fmt(inicio), hasta: fmt(fin) };
}

function getLabelPeriod() {
  const r = new Date(fechaRef);
  if (periodo === 'hoy') {
    return r.toLocaleDateString('es-GT', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  }
  if (periodo === 'semana') {
    const lunes = new Date(r);
    lunes.setDate(r.getDate() - ((r.getDay() + 6) % 7));
    const domingo = new Date(lunes);
    domingo.setDate(lunes.getDate() + 6);
    const optsS = { day: 'numeric', month: 'short' };
    return lunes.toLocaleDateString('es-GT', optsS) + ' – ' + domingo.toLocaleDateString('es-GT', optsS) + ' ' + domingo.getFullYear();
  }
  return MESES[r.getMonth()] + ' ' + r.getFullYear();
}

// ── Navegación ───────────────────────────────────────────────
function navPeriod(dir) {
  const r = new Date(fechaRef);
  if (periodo === 'hoy')    r.setDate(r.getDate() + dir);
  if (periodo === 'semana') r.setDate(r.getDate() + dir * 7);
  if (periodo === 'mes')    r.setMonth(r.getMonth() + dir);
  fechaRef = r;
  sincPicker();
  cargarComandas();
}

function irHoy() {
  fechaRef = new Date();
  sincPicker();
  cargarComandas();
}

function pickerChanged(val) {
  // val viene como "2026-05" (type=month) o "2026-W22" (type=week) o "2026-06-04" (type=date)
  if (!val) return;
  if (periodo === 'mes') {
    const [y, m] = val.split('-');
    fechaRef = new Date(parseInt(y), parseInt(m) - 1, 1);
  } else if (periodo === 'semana') {
    // type=week devuelve YYYY-Www
    const [y, w] = val.split('-W');
    const d = new Date(parseInt(y), 0, 1 + (parseInt(w) - 1) * 7);
    d.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    fechaRef = d;
  } else {
    fechaRef = new Date(val + 'T12:00:00');
  }
  cargarComandas();
}

function sincPicker() {
  const picker = document.getElementById('periodPicker');
  if (!picker) return;
  const r = new Date(fechaRef);
  if (periodo === 'mes') {
    picker.type = 'month';
    picker.value = r.getFullYear() + '-' + String(r.getMonth() + 1).padStart(2, '0');
  } else if (periodo === 'semana') {
    picker.type = 'week';
    // calcular número de semana ISO
    const lunes = new Date(r);
    lunes.setDate(r.getDate() - ((r.getDay() + 6) % 7));
    const startOfYear = new Date(lunes.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((lunes - startOfYear) / 86400000 + 1) / 7);
    picker.value = lunes.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
  } else {
    picker.type = 'date';
    picker.value = fmt(r);
  }
}

function setPeriod(p) {
  periodo = p;
  document.querySelectorAll('.period-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.p === p));
  sincPicker();
  cargarComandas();
}

// ── Carga de datos ───────────────────────────────────────────
async function cargarComandas() {
  const { desde, hasta } = getFechas();
  const label = getLabelPeriod();
  document.getElementById('pageSubLabel').innerHTML = `Período: <strong>${label}</strong> &nbsp;·&nbsp; <span style="font-family:monospace;font-size:11px;color:#A8A6A0">${desde} → ${hasta}</span>`;
  document.getElementById('periodDateLabel').textContent = label;

  // Deshabilitar flechas hacia futuro si ya estamos en el período actual
  const hoy = new Date();
  const esActual = (periodo === 'mes' && fechaRef.getMonth() === hoy.getMonth() && fechaRef.getFullYear() === hoy.getFullYear())
                || (periodo === 'semana' && fmt(fechaRef) >= fmt(new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate() - ((hoy.getDay()+6)%7))))
                || (periodo === 'hoy' && fmt(fechaRef) === fmt(hoy));
  const btnNext = document.querySelectorAll('.nav-arrow')[1];
  if (btnNext) { btnNext.style.opacity = esActual ? '.3' : '1'; btnNext.disabled = esActual; }

  try {
    const { data } = await db
      .from('comandas')
      .select('id, fecha, correlativo, operario_id, operario_nombre, supervisor_nombre, total_unidades, comanda_tareas(proceso, cantidad, unidades_completadas, estado)')
      .gte('fecha', desde)
      .lte('fecha', hasta)
      .order('fecha', { ascending: false });
    comandas = data || [];
    renderizar();
  } catch(e) { console.error(e); comandas = []; renderizar(); }
}

// ── Render ───────────────────────────────────────────────────
function renderizar() { renderKPIs(); renderRanking(); renderProcesos(); renderHistorial(); }

function renderKPIs() {
  const totalUnd = comandas.reduce((s, c) => s + (c.total_unidades || 0), 0);
  const totalCmds = comandas.length;
  const operarios = new Set(comandas.map(c => c.operario_id).filter(Boolean));
  const promedio = totalCmds > 0 ? Math.round(totalUnd / totalCmds) : 0;
  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-card highlight"><div class="kpi-val">${totalUnd.toLocaleString()}</div><div class="kpi-lbl">Unidades PT</div><div class="kpi-sub">producción real</div></div>
    <div class="kpi-card"><div class="kpi-val">${totalCmds}</div><div class="kpi-lbl">Comandas</div><div class="kpi-sub">registros</div></div>
    <div class="kpi-card"><div class="kpi-val">${operarios.size}</div><div class="kpi-lbl">Operadores</div><div class="kpi-sub">con producción</div></div>
    <div class="kpi-card"><div class="kpi-val">${promedio.toLocaleString()}</div><div class="kpi-lbl">Promedio x comanda</div><div class="kpi-sub">unidades por registro</div></div>
  `;
}

// ── Helpers ranking detalle ──────────────────────────────────
function getOpTareas(opId) {
  const porProc = {};
  comandas
    .filter(function(c) { return c.operario_id === opId; })
    .forEach(function(c) {
      (c.comanda_tareas || []).forEach(function(t) {
        const proc = t.proceso || 'Otra tarea';
        const und  = t.unidades_completadas || t.cantidad || 0;
        if (!porProc[proc]) porProc[proc] = { und: 0, tareas: 0, terminadas: 0 };
        porProc[proc].und += und;
        porProc[proc].tareas++;
        if (t.estado === 'Terminada') porProc[proc].terminadas++;
      });
    });
  return Object.entries(porProc).sort(function(a, b) { return b[1].und - a[1].und; });
}

function buildDetProcRow(proc, d, maxUnd) {
  const color  = PROC_COLORS[proc] || '#6B6B6A';
  const pct    = maxUnd > 0 ? Math.round((d.und / maxUnd) * 100) : 0;
  const pend   = d.tareas - d.terminadas;
  const meta   = d.terminadas + ' OK' + (pend > 0 ? ' · ' + pend + ' pend.' : '');
  return '<div class="det-proc-row">'
    + '<div class="det-proc-chip" style="background:' + color + '22;color:' + color + '">' + proc + '</div>'
    + '<div class="det-proc-bar-wrap"><div class="det-proc-bar" style="width:' + pct + '%;background:' + color + '"></div></div>'
    + '<div class="det-proc-und">' + d.und.toLocaleString() + ' und</div>'
    + '<div class="det-proc-meta">' + meta + '</div>'
    + '</div>';
}

function buildOpDetail(opId) {
  const tareas = getOpTareas(opId);
  if (tareas.length === 0) return '<div style="font-size:12px;color:#A8A6A0;padding:6px 0">Sin tareas registradas</div>';
  const maxUnd = tareas[0][1].und;
  const totalUnd = tareas.reduce(function(s, t) { return s + t[1].und; }, 0);
  const totalTar = tareas.reduce(function(s, t) { return s + t[1].tareas; }, 0);
  let html = '<div class="rank-detail-title">Desglose por proceso</div>';
  tareas.forEach(function(entry) { html += buildDetProcRow(entry[0], entry[1], maxUnd); });
  html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid #C8EDE7;display:flex;gap:16px;font-size:11px;color:#6B6B6A">'
    + '<span>Total: <strong style="color:#0C0C0B">' + totalUnd.toLocaleString() + ' und</strong></span>'
    + '<span>' + tareas.length + ' proceso' + (tareas.length !== 1 ? 's' : '') + '</span>'
    + '<span>' + totalTar + ' tarea' + (totalTar !== 1 ? 's' : '') + '</span>'
    + '</div>';
  return html;
}

function toggleOpDetail(opId) {
  expandedOp = expandedOp === opId ? null : opId;
  // Actualizar clases sin re-render completo
  document.querySelectorAll('.rank-item').forEach(function(item) {
    const id = item.dataset.opid;
    const row    = item.querySelector('.ranking-row');
    const detail = item.querySelector('.rank-detail');
    const chev   = item.querySelector('.rank-chevron');
    const open   = id === expandedOp;
    if (row)    row.classList.toggle('expanded', open);
    if (detail) { detail.classList.toggle('open', open); if (open) detail.innerHTML = buildOpDetail(id); }
    if (chev)   chev.classList.toggle('open', open);
  });
}

function renderRanking() {
  const porOp = {};
  comandas.forEach(function(c) {
    if (!c.operario_id) return;
    if (!porOp[c.operario_id]) porOp[c.operario_id] = { nombre: c.operario_nombre || c.operario_id, und: 0, cmds: 0 };
    porOp[c.operario_id].und += (c.total_unidades || 0);
    porOp[c.operario_id].cmds++;
  });
  const ranking = Object.entries(porOp).map(function(e) { return Object.assign({ id: e[0] }, e[1]); }).sort(function(a, b) { return b.und - a.und; });
  if (ranking.length === 0) { document.getElementById('rankingContent').innerHTML = '<div class="empty">📭 No hay datos de producción</div>'; return; }
  const maxUnd  = ranking[0].und;
  const medals  = ['🥇', '🥈', '🥉'];
  const initials = function(nombre) { return (nombre || '').split(' ').map(function(w) { return w[0] || ''; }).join('').slice(0, 2).toUpperCase(); };

  document.getElementById('rankingContent').innerHTML = ranking.map(function(op, i) {
    const color = OP_COLORS[op.id] || '#6B6B6A';
    const pct   = Math.round((op.und / maxUnd) * 100);
    const isOpen = expandedOp === op.id;
    return '<div class="rank-item" data-opid="' + op.id + '">'
      + '<div class="ranking-row' + (isOpen ? ' expanded' : '') + '" onclick="toggleOpDetail(\'' + op.id + '\')">'
      + '<div class="rank-medal">' + (medals[i] || '') + '</div>'
      + '<div class="rank-avatar" style="background:' + color + '">' + initials(op.nombre) + '</div>'
      + '<div class="rank-info"><div class="rank-name">' + op.nombre + '</div><div class="rank-cmds">' + op.cmds + ' comanda' + (op.cmds !== 1 ? 's' : '') + '</div></div>'
      + '<div class="rank-bar-wrap"><div class="rank-bar" style="width:' + pct + '%"></div></div>'
      + '<div class="rank-und">' + op.und.toLocaleString() + ' und</div>'
      + '<div class="rank-chevron' + (isOpen ? ' open' : '') + '">▼</div>'
      + '</div>'
      + '<div class="rank-detail' + (isOpen ? ' open' : '') + '">' + (isOpen ? buildOpDetail(op.id) : '') + '</div>'
      + '</div>';
  }).join('');
}

function renderProcesos() {
  const porProc = {};
  comandas.forEach(c => { (c.comanda_tareas || []).forEach(t => { if (t.estado === 'Terminada') { const proc = t.proceso || 'Otra tarea'; const und = t.unidades_completadas || t.cantidad || 0; if (!porProc[proc]) porProc[proc] = { und: 0, tareas: 0 }; porProc[proc].und += und; porProc[proc].tareas++; } }); });
  const procList = Object.entries(porProc).sort((a, b) => b[1].und - a[1].und);
  if (procList.length === 0) { document.getElementById('procesosContent').innerHTML = '<div class="empty">🔧 No hay procesos registrados</div>'; return; }
  const maxUnd = procList[0][1].und;
  document.getElementById('procesosContent').innerHTML = procList.map(([proc, d]) => `<div class="proc-row"><div class="proc-chip" style="background:${(PROC_COLORS[proc] || '#6B6B6A')}20;color:${PROC_COLORS[proc] || '#6B6B6A'}">${proc}</div><div class="proc-bar-wrap"><div class="proc-bar" style="width:${Math.round((d.und / maxUnd) * 100)}%;background:${PROC_COLORS[proc] || '#6B6B6A'}"></div></div><div class="proc-und">${d.und.toLocaleString()} und</div><div class="proc-tareas">${d.tareas} tareas</div></div>`).join('');
}

function renderHistorial() {
  if (comandas.length === 0) { document.getElementById('histCount').textContent = '0 comandas'; document.getElementById('historialContent').innerHTML = '<div class="empty">📋 No hay comandas en este período</div>'; return; }
  const total = comandas.length;
  const mostrar = comandas.slice(0, historialLimit);
  const tieneMas = total > historialLimit;
  document.getElementById('histCount').textContent = `${total} comandas`;
  document.getElementById('historialContent').innerHTML = `
    <div><div class="historial-header" onclick="toggleHistorial()"><span>📋 Mostrar / Ocultar historial (${total} comandas)</span><span class="toggle-icon ${historialOpen ? 'rotated' : ''}">▼</span></div>
    <div class="historial-body ${historialOpen ? 'open' : ''}"><div style="overflow-x:auto"><table class="hist-table"><thead><tr><th>Fecha</th><th>Correlativo</th><th>Operario</th><th>Supervisor</th><th style="text-align:right">Unidades</th></tr></thead><tbody>
      ${mostrar.map(c => `<tr onclick="window.location.href='comandas.html?id=${c.id}'"><td style="font-family:monospace;font-size:11px">${c.fecha || '—'}</td><td><strong>${c.correlativo || '—'}</strong></td><td>${c.operario_nombre || '—'}</td><td>${c.supervisor_nombre || '—'}</td><td style="text-align:right;font-weight:700;color:#1A6B5B">${(c.total_unidades || 0).toLocaleString()}</td></tr>`).join('')}
    </tbody></table></div>${tieneMas ? `<button class="ver-mas-btn" onclick="cargarMasHistorial()">+ Ver ${total - historialLimit} comandas más</button>` : ''}</div></div>
  `;
}

function toggleHistorial() { historialOpen = !historialOpen; const body = document.querySelector('.historial-body'); const icon = document.querySelector('.toggle-icon'); if(body) body.classList.toggle('open', historialOpen); if(icon) icon.classList.toggle('rotated', historialOpen); }
function cargarMasHistorial() { historialLimit = comandas.length; renderHistorial(); }

document.addEventListener('DOMContentLoaded', () => { sincPicker(); cargarComandas(); });
</script>
