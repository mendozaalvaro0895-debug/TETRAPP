<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRAPLASTIC — Dashboard Ejecutivo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0C0C0B; --teal:#1A6B5B; --teal-l:#C8EDE7; --teal-xl:#EBF7F4;
  --gold:#B07D2A; --red:#B83232; --bg:#F7F6F2; --card:#fff;
  --border:#E0DED8; --gray:#6B6B6A; --gray-l:#A8A6A0;
  --font:'DM Sans',sans-serif; --display:'Playfair Display',serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--ink);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #1E7D6A}
.logo{font-family:var(--display);font-size:16px;font-weight:900;color:#fff}
.logo span{color:#7ECEC0}
.nav-btns{display:flex;gap:8px}
.nav-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;font-family:var(--font)}
.nav-btn:hover{background:rgba(255,255,255,.22)}
.nav-btn.active{background:var(--teal);border-color:var(--teal)}

/* LAYOUT */
.page{max-width:1280px;margin:0 auto;padding:24px}
.page-title{font-family:var(--display);font-size:28px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--gray);margin-bottom:24px}

/* PERIOD SELECTOR */
.period-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.period-label{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.period-btn{background:var(--card);border:1.5px solid var(--border);color:var(--gray);padding:7px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all .15s}
.period-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}
.period-btn:hover:not(.active){background:var(--teal-xl);border-color:var(--teal-l);color:var(--teal)}
.period-date{font-family:var(--mono);font-size:11px;color:var(--gray-l);margin-left:4px}

/* KPI STRIP SUPERIOR */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi-card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kpi-card.highlight{background:var(--ink);border-color:var(--ink)}
.kpi-icon{font-size:20px;margin-bottom:8px}
.kpi-val{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--ink);line-height:1}
.kpi-card.highlight .kpi-val{color:#7ECEC0}
.kpi-lbl{font-size:11px;color:var(--gray);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.kpi-card.highlight .kpi-lbl{color:rgba(255,255,255,.4)}
.kpi-sub{font-size:10px;color:var(--gray-l);margin-top:2px}
.kpi-card.highlight .kpi-sub{color:rgba(255,255,255,.25)}

/* SECTION */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-family:var(--display);font-size:20px;font-weight:700}
.sec-tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--teal);background:var(--teal-xl);padding:4px 10px;border-radius:20px}

/* GRID 2 COLUMNAS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:24px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:24px}

/* CARD BASE */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.04)}

/* RANKING */
.ranking-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.ranking-row:last-child{border-bottom:none}
.rank-pos{width:24px;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--gray-l);text-align:center;flex-shrink:0}
.rank-medal{font-size:16px;width:24px;text-align:center;flex-shrink:0}
.rank-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:600;color:var(--ink)}
.rank-cmds{font-size:10px;color:var(--gray)}
.rank-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.rank-bar{height:6px;border-radius:4px;background:var(--teal);transition:width .6s ease}
.rank-und{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--teal);white-space:nowrap;min-width:80px;text-align:right}

/* PROCESOS */
.proc-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.proc-row:last-child{border-bottom:none}
.proc-chip{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;min-width:90px;text-align:center}
.proc-chip.armado{background:var(--teal-xl);color:var(--teal)}
.proc-chip.banda{background:#FFF3D6;color:var(--gold)}
.proc-chip.liner{background:#E0E7FF;color:#4338CA}
.proc-chip.impresion{background:#FCE7F3;color:#9D174D}
.proc-chip.encajado{background:#DCFCE7;color:#166534}
.proc-chip.otro{background:var(--bg);color:var(--gray)}
.proc-bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.proc-bar{height:6px;border-radius:4px;transition:width .6s ease}
.proc-und{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;min-width:70px;text-align:right}
.proc-tareas{font-size:10px;color:var(--gray-l);white-space:nowrap;min-width:55px;text-align:right}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--gray)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--teal-l);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--gray);font-size:13px}

/* HISTORIAL TABLE */
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--gray);padding:8px 10px;border-bottom:2px solid var(--border);text-align:left}
.hist-table td{padding:10px;border-bottom:1px solid var(--border);font-size:12px}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:var(--bg)}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-term{background:#DCFCE7;color:#166534}
.b-proc{background:#DBEAFE;color:#1A3B8B}
.b-asig{background:#FFF3D6;color:#7A4800}

/* DETALLE POR PROCESO */
.proc-block { border:1.5px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:all .2s; background:var(--card); }
.proc-block:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); transform:translateY(-2px); }
.proc-block.expanded { box-shadow:0 6px 24px rgba(0,0,0,.1); transform:translateY(-2px); }
.proc-block-head { display:flex; user-select:none; }
.proc-block-name { font-family:var(--display); font-weight:700; }
.proc-block-arrow { font-size:12px; transition:transform .25s; }
.proc-block.expanded .proc-block-arrow { transform:rotate(180deg); }
.proc-block-body { display:none; border-top:1px solid var(--border); background:var(--bg); }
.proc-block.expanded .proc-block-body { display:block; }
.op-rank-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); }
.op-rank-row:last-child { border-bottom:none; }
.op-rank-medal { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.op-rank-av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.op-rank-name { flex:1; font-size:13px; font-weight:600; }
.op-rank-bar-wrap { width:120px; background:rgba(0,0,0,.07); border-radius:4px; height:5px; }
.op-rank-bar { height:5px; border-radius:4px; transition:width .5s ease; }
.op-rank-und { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--ink); white-space:nowrap; min-width:90px; text-align:right; }
.op-rank-he { font-size:10px; color:var(--gray); white-space:nowrap; min-width:55px; text-align:right; }
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">TETRA<span>PLASTIC</span></div>
    <div style="width:1px;height:18px;background:rgba(255,255,255,.2)"></div>
    <span style="font-size:12px;color:rgba(255,255,255,.6)">📊 Dashboard Ejecutivo</span>
  </div>
  <div class="nav-btns">
    <a href="tapas.html" class="nav-btn">🏷 Tapas</a>
    <a href="comandas.html" class="nav-btn">📋 Comandas</a>
    <a href="index.html" class="nav-btn">🏠 Inicio</a>
  </div>
</div>

<div class="page">

  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">
    <div>
      <div class="page-title">Productividad · Tapas</div>
      <div class="page-sub" id="pageSubLabel">Cargando datos...</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span class="period-label">Período:</span>
      <button class="period-btn" data-p="hoy" onclick="setPeriod('hoy')">Hoy</button>
      <button class="period-btn" data-p="semana" onclick="setPeriod('semana')">Esta semana</button>
      <button class="period-btn active" data-p="mes" onclick="setPeriod('mes')">Este mes</button>
      <span class="period-date" id="periodDateLabel"></span>
    </div>
  </div>

  <!-- KPI STRIP -->
  <div class="kpi-strip" id="kpiStrip">
    <div class="kpi-card loading"><div class="spinner"></div></div>
    <div class="kpi-card loading"><div class="spinner"></div></div>
    <div class="kpi-card loading"><div class="spinner"></div></div>
    <div class="kpi-card loading"><div class="spinner"></div></div>
  </div>

  <!-- ══ DETALLE POR PROCESO ══════════════════════════════ -->
  <div class="card" style="margin-bottom:24px">
    <div class="sec-header">
      <div class="sec-title">🔧 Detalle por proceso</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="date" id="diaEspecifico" style="border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:var(--font);background:var(--bg)" onchange="filtrarPorDia(this.value)">
        <button onclick="limpiarDia()" style="border:1.5px solid var(--border);background:var(--bg);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)">Ver período</button>
        <div class="sec-tag" id="detalleLabel">período activo</div>
      </div>
    </div>
    <div id="detalleProcGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:4px">
      <div class="loading"><div class="spinner"></div><div>Cargando...</div></div>
    </div>
  </div>

  <!-- ══ RANKING + PROCESOS ════════════════════════════════ -->
  <div class="grid-2">

    <!-- Ranking operarios -->
    <div class="card">
      <div class="sec-header">
        <div class="sec-title">🏆 Ranking · Unidades PT</div>
        <div class="sec-tag">por operario</div>
      </div>
      <div id="rankingContent"><div class="loading"><div class="spinner"></div><div>Cargando...</div></div></div>
    </div>

    <!-- Procesos -->
    <div class="card">
      <div class="sec-header">
        <div class="sec-title">🔧 Procesos del período</div>
        <div class="sec-tag">distribución</div>
      </div>
      <div id="procesosContent"><div class="loading"><div class="spinner"></div><div>Cargando...</div></div></div>
    </div>

  </div>

  <!-- HISTORIAL DE COMANDAS -->
  <div class="card" style="margin-bottom:24px">
    <div class="sec-header">
      <div class="sec-title">📋 Historial de comandas</div>
      <div class="sec-tag" id="histCount">—</div>
    </div>
    <div id="historialContent"><div class="loading"><div class="spinner"></div><div>Cargando...</div></div></div>
  </div>




</div><!-- /page -->

<script>
// ══ SUPABASE ═══════════════════════════════════════════
const SUPA_URL = 'https://rohdxjuuvpgrhevfsrye.supabase.co';
const SUPA_KEY = 'sb_publishable_PayfE36QRzwOnP6zA2TDSQ_oj4vnB5i';
const db = supabase.createClient(SUPA_URL, SUPA_KEY);

// Colores de operarios Tapas
const OP_COLORS = {
  T0:'#0D4035',T1:'#1A6B5B',T2:'#2E86AB',T3:'#A23B72',T4:'#F18F01',
  T5:'#C73E1D',T6:'#3B1F2B',T7:'#44BBA4',T8:'#E94F37',T9:'#393E41'
};

const PROC_COLORS = {
  'Armado':'#1A6B5B','Banda':'#B07D2A','Liner':'#4338CA',
  'Impresión':'#9D174D','Encajado':'#166534','Flameado':'#0369A1','Otra tarea':'#6B6B6A'
};

let periodo = 'mes';

// ══ INIT ════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => cargarDatos());

function setPeriod(p) {
  periodo = p;
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.p === p);
  });
  cargarDatos();
}

function getFechas(p) {
  const hoy = new Date();
  const pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  if (p === 'hoy') {
    const f = fmt(hoy);
    return { desde:f, hasta:f, label:'Hoy · ' + hoy.toLocaleDateString('es-GT',{weekday:'long',day:'2-digit',month:'long'}) };
  }
  if (p === 'semana') {
    const lunes = new Date(hoy);
    lunes.setDate(hoy.getDate() - ((hoy.getDay()+6)%7));
    return { desde:fmt(lunes), hasta:fmt(hoy), label:`Semana ${fmt(lunes)} al ${fmt(hoy)}` };
  }
  const inicio = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
  return { desde:fmt(inicio), hasta:fmt(hoy), label:hoy.toLocaleDateString('es-GT',{month:'long',year:'numeric'}) };
}

// ══ CARGA PRINCIPAL ══════════════════════════════════════
async function cargarDatos() {
  const { desde, hasta, label } = getFechas(periodo);
  document.getElementById('pageSubLabel').textContent = label;
  document.getElementById('periodDateLabel').textContent = desde === hasta ? desde : `${desde} → ${hasta}`;

  try {
    const { data, error } = await db
      .from('comandas')
      .select('id, fecha, operario_id, operario_nombre, supervisor_nombre, total_unidades, hora_inicio, hora_cierre, comanda_tareas(proceso, cantidad, unidades_completadas, estado, metodo, capacidad_hora, horas_efectivas)')
      .gte('fecha', desde)
      .lte('fecha', hasta)
      .order('fecha', { ascending: false });

    if (error) throw error;
    const cmds = data || [];

    renderKPIs(cmds);
    renderRanking(cmds);
    renderProcesos(cmds);
    renderHistorial(cmds);
    cargarDetalle(cmds);

  } catch(e) {
    console.error('Error:', e);
    document.getElementById('pageSubLabel').textContent = 'Error al cargar datos. Verifica la conexión.';
  }
}

// ══ KPIs ════════════════════════════════════════════════
function renderKPIs(cmds) {
  const totalUnd = cmds.reduce((s,c) => s + (c.total_unidades||0), 0);
  const totalCmds = cmds.length;
  const opSet = new Set(cmds.map(c => c.operario_id));
  const prom = opSet.size > 0 ? Math.round(totalUnd / opSet.size) : 0;

  // Calcular unidades por proceso Terminada
  const todasTareas = cmds.flatMap(c => c.comanda_tareas||[]);
  const tareasTerminadas = todasTareas.filter(t => t.estado === 'Terminada');

  // Calcular horas efectivas totales
  let heManual = 0, heMaquina = 0;
  tareasTerminadas.forEach(t => {
    const met = t.metodo || 'manual';
    const proc = t.proceso || '';
    const cap = t.capacidad_hora && t.capacidad_hora > 0
      ? t.capacidad_hora
      : getCapDash(proc, met);
    const und = t.unidades_completadas || t.cantidad || 0;
    const he = und > 0 ? und / cap : 0;
    if (MAQUINAS.includes(met)) heMaquina += he;
    else heManual += he;
  });

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-card highlight">
      <div class="kpi-icon">📦</div>
      <div class="kpi-val">${totalUnd.toLocaleString()}</div>
      <div class="kpi-lbl">Unidades PT</div>
      <div class="kpi-sub">Tareas terminadas</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">📋</div>
      <div class="kpi-val">${totalCmds}</div>
      <div class="kpi-lbl">Comandas</div>
      <div class="kpi-sub">${opSet.size} operarios activos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">✋</div>
      <div class="kpi-val">${heManual.toFixed(1)}h</div>
      <div class="kpi-lbl">Horas ef. manual</div>
      <div class="kpi-sub">trabajo a mano</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon">⚙</div>
      <div class="kpi-val">${heMaquina.toFixed(1)}h</div>
      <div class="kpi-lbl">Horas ef. máquina</div>
      <div class="kpi-sub">Liner PP33 + Armado PP28</div>
    </div>
  `;
}

// ══ CAPACIDADES ═════════════════════════════════════════
const CAP = {
  manual: 833,
  manual_rapido: 1167,
  maquina_liner: 2500,
  maquina_armado: 2500
};
const MAQUINAS = ['maquina_liner','maquina_armado'];
const PROCESOS_RAPIDOS = ['Flameado', 'Impresión'];

function getCapDash(proceso, metodo) {
  if (metodo === 'maquina_liner') return CAP.maquina_liner;
  if (metodo === 'maquina_armado') return CAP.maquina_armado;
  if (PROCESOS_RAPIDOS.includes(proceso)) return CAP.manual_rapido;
  return CAP.manual;
}

// ══ RANKING ═════════════════════════════════════════════
function renderRanking(cmds) {
  // Construir datos por operario con separación manual/máquina
  const porOp = {};
  cmds.forEach(c => {
    if (!porOp[c.operario_id]) {
      porOp[c.operario_id] = {
        nombre: c.operario_nombre || c.operario_id,
        und_total: 0, und_manual: 0, und_maquina: 0,
        he_total: 0, he_manual: 0, he_maquina: 0, he_rapido: 0,
        cmds: 0, tipo: 'manual'
      };
    }
    const op = porOp[c.operario_id];
    op.und_total += (c.total_unidades || 0);
    op.cmds++;

    (c.comanda_tareas || []).filter(t => t.estado === 'Terminada').forEach(t => {
      const und = t.unidades_completadas || t.cantidad || 0;
      const met = t.metodo || 'manual';
      const proc = t.proceso || '';
      const cap = t.capacidad_hora && t.capacidad_hora > 0
        ? t.capacidad_hora
        : getCapDash(proc, met);
      const he = und > 0 ? und / cap : 0;
      if (MAQUINAS.includes(met)) {
        op.und_maquina += und;
        op.he_maquina += he;
        op.tipo = 'maquina';
      } else {
        op.und_manual += und;
        op.he_manual += he;
        if (PROCESOS_RAPIDOS.includes(t.proceso||'')) op.he_rapido += he;
      }
      op.he_total += he;
    });
  });

  const ops = Object.entries(porOp).map(([id, d]) => ({ id, ...d }));
  if (!ops.length) {
    document.getElementById('rankingContent').innerHTML = '<div class="empty">Sin datos en este período.</div>';
    return;
  }

  const manual = ops.filter(o => o.tipo === 'manual' && o.he_manual > 0).sort((a,b) => b.he_manual - a.he_manual);
  const maquina = ops.filter(o => o.und_maquina > 0).sort((a,b) => b.und_maquina - a.und_maquina);
  const equiparado = [...ops].filter(o => o.he_total > 0).sort((a,b) => b.he_total - a.he_total);

  const medals = ['🥇','🥈','🥉'];

  function rowHE(op, i, maxHE, tipo) {
    const pct = Math.round((op.he_total / maxHE) * 100);
    const color = OP_COLORS[op.id] || '#6B6B6A';
    const ini = (op.nombre||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const esMaq = op.und_maquina > 0;
    const he = tipo === 'manual' ? op.he_manual : tipo === 'maquina' ? op.he_maquina : op.he_total;
    const maxVal = tipo === 'manual' ? (manual[0]?.he_manual||1) : tipo === 'maquina' ? (maquina[0]?.he_maquina||1) : maxHE;
    const pctBar = Math.round((he/maxVal)*100);
    return `<div class="ranking-row">
      <div class="rank-medal">${medals[i]||''}</div>
      <div class="rank-avatar" style="background:${color}">${ini}</div>
      <div class="rank-info">
        <div class="rank-name">${(op.nombre||'').split(' ')[0]} ${(op.nombre||'').split(' ')[1]||''}
          ${esMaq && tipo !== 'manual' ? '<span style="font-size:9px;background:#EBF7F4;color:#0D4035;padding:1px 5px;border-radius:8px;margin-left:4px">⚙ Máq.</span>' : ''}
          ${!esMaq && op.he_rapido > 0 ? '<span style="font-size:9px;background:#FFF3D6;color:#7A4800;padding:1px 5px;border-radius:8px;margin-left:4px">⚡ Rápido</span>' : ''}
        </div>
        <div class="rank-cmds">${op.cmds} comanda${op.cmds!==1?'s':''} · ${he.toFixed(1)}h efectivas</div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pctBar}%"></div></div>
      <div class="rank-und" style="font-size:11px">${he.toFixed(1)}h</div>
    </div>`;
  }

  function rowUnd(op, i) {
    const color = OP_COLORS[op.id] || '#6B6B6A';
    const ini = (op.nombre||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const maxV = maquina[0]?.und_maquina || 1;
    const pct = Math.round((op.und_maquina/maxV)*100);
    return `<div class="ranking-row">
      <div class="rank-medal">${medals[i]||''}</div>
      <div class="rank-avatar" style="background:${color}">${ini}</div>
      <div class="rank-info">
        <div class="rank-name">${(op.nombre||'').split(' ')[0]}</div>
        <div class="rank-cmds">${op.cmds} comandas · ⚙ Máquina</div>
      </div>
      <div class="rank-bar-wrap"><div class="rank-bar" style="width:${pct}%;background:var(--gold)"></div></div>
      <div class="rank-und">${op.und_maquina.toLocaleString()} und</div>
    </div>`;
  }

  const maxHE = equiparado[0]?.he_total || 1;

  document.getElementById('rankingContent').innerHTML = `
    <!-- RANKING EQUIPARADO -->
    <div style="font-size:10px;font-weight:800;letter-spacing:1px;color:var(--teal);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--teal-l)">
      ⚖ Ranking equiparado · Horas efectivas
    </div>
    ${equiparado.map((op,i) => rowHE(op,i,maxHE,'equiparado')).join('')}

    ${manual.length ? `
    <div style="font-size:10px;font-weight:800;letter-spacing:1px;color:var(--gray);text-transform:uppercase;margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)">
      ✋ Manual · Horas efectivas
    </div>
    ${manual.map((op,i) => rowHE(op,i,maxHE,'manual')).join('')}` : ''}

    ${maquina.length ? `
    <div style="font-size:10px;font-weight:800;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin:14px 0 10px;padding-bottom:6px;border-bottom:1px solid #FEF3C7">
      ⚙ Máquinas · Unidades brutas
    </div>
    ${maquina.map((op,i) => rowUnd(op,i)).join('')}` : ''}
  `;
}

// ══ PROCESOS ════════════════════════════════════════════
function renderProcesos(cmds) {
  const porProc = {};
  cmds.forEach(c => {
    (c.comanda_tareas || []).forEach(t => {
      const p = t.proceso || 'Otra tarea';
      if (!porProc[p]) porProc[p] = { und: 0, tareas: 0, terminadas: 0 };
      porProc[p].und += (t.unidades_completadas || 0);
      porProc[p].tareas++;
      if (t.estado === 'Terminada') porProc[p].terminadas++;
    });
  });

  const procList = Object.entries(porProc).sort((a, b) => b[1].und - a[1].und);

  if (!procList.length) {
    document.getElementById('procesosContent').innerHTML = '<div class="empty">Sin tareas en este período.</div>';
    return;
  }

  const maxUnd = procList[0][1].und || 1;

  document.getElementById('procesosContent').innerHTML = procList.map(([proc, d]) => {
    const pct = Math.round((d.und / maxUnd) * 100);
    const color = PROC_COLORS[proc] || '#6B6B6A';
    const cls = proc.toLowerCase().replace(/[^a-z]/g,'').slice(0,8);
    return `
    <div class="proc-row">
      <div class="proc-chip ${cls}" style="background:${color}20;color:${color}">${proc}</div>
      <div class="proc-bar-wrap">
        <div class="proc-bar" style="width:${pct}%;background:${color}"></div>
      </div>
      <div class="proc-und">${d.und.toLocaleString()} und</div>
      <div class="proc-tareas">${d.tareas} tareas</div>
    </div>`;
  }).join('');
}

// ══ HISTORIAL ═══════════════════════════════════════════
function renderHistorial(cmds) {
  document.getElementById('histCount').textContent = `${cmds.length} comandas`;

  if (!cmds.length) {
    document.getElementById('historialContent').innerHTML = '<div class="empty">No hay comandas en este período.</div>';
    return;
  }

  document.getElementById('historialContent').innerHTML = `
    <div style="overflow-x:auto">
    <table class="hist-table">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Correlativo</th>
          <th>Operario</th>
          <th>Supervisor</th>
          <th>Tareas</th>
          <th>Inicio</th>
          <th>Cierre</th>
          <th style="text-align:right">Unidades PT</th>
        </tr>
      </thead>
      <tbody>
        ${cmds.map(c => {
          const tareas = c.comanda_tareas || [];
          const term = tareas.filter(t => t.estado === 'Terminada').length;
          const enProc = tareas.filter(t => t.estado === 'En proceso').length;
          const badgeCls = term === tareas.length && tareas.length > 0 ? 'b-term' : enProc > 0 ? 'b-proc' : 'b-asig';
          const badgeTxt = term === tareas.length && tareas.length > 0 ? 'Completa' : enProc > 0 ? 'En proceso' : 'Asignada';
          return `<tr>
            <td style="font-family:var(--mono);font-size:11px">${c.fecha||'—'}</td>
            <td style="font-weight:600">${c.correlativo||'—'}</td>
            <td>${c.operario_nombre||'—'}</td>
            <td style="color:var(--gray)">${c.supervisor_nombre||'—'}</td>
            <td>
              <span class="badge ${badgeCls}">${badgeTxt}</span>
              <span style="font-size:10px;color:var(--gray-l);margin-left:4px">${tareas.length} tarea${tareas.length!==1?'s':''}</span>
            </td>
            <td style="font-family:var(--mono);font-size:11px">${c.hora_inicio||'—'}</td>
            <td style="font-family:var(--mono);font-size:11px">${c.hora_cierre||'—'}</td>
            <td style="font-family:var(--mono);font-weight:700;color:var(--teal);text-align:right">${(c.total_unidades||0).toLocaleString()}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>`;
}

// ══ DETALLE POR PROCESO ════════════════════════════════════
let cmdsCacheDetalle = [];

const PROC_COLORS_D = {
  'Liner':'#4338CA','Armado':'#1A6B5B','Banda':'#B07D2A',
  'Impresión':'#9D174D','Encajado':'#166534','Flameado':'#0369A1','Otra tarea':'#6B6B6A'
};
const PROC_ORDER = ['Liner','Armado','Impresión','Flameado','Encajado','Banda','Otra tarea'];

async function cargarDetalle(cmds) {
  cmdsCacheDetalle = cmds;
  renderDetalleProc(cmds);
}

function filtrarPorDia(fecha) {
  const label = document.getElementById('detalleLabel');
  if (label) label.textContent = fecha || 'período activo';
  const filtradas = fecha
    ? cmdsCacheDetalle.filter(c => c.fecha === fecha)
    : cmdsCacheDetalle;
  renderDetalleProc(filtradas);
}

function limpiarDia() {
  document.getElementById('diaEspecifico').value = '';
  document.getElementById('detalleLabel').textContent = 'período activo';
  renderDetalleProc(cmdsCacheDetalle);
}

function renderDetalleProc(cmds) {
  const cont = document.getElementById('detalleProcGrid');
  if (!cont) return;

  // Agrupar por proceso → por operario
  const porProc = {};
  cmds.forEach(c => {
    (c.comanda_tareas || []).filter(t => t.estado === 'Terminada').forEach(t => {
      const proc = t.proceso || 'Otra tarea';
      const und = t.unidades_completadas || t.cantidad || 0;
      const met = t.metodo || 'manual';
      const cap = t.capacidad_hora && t.capacidad_hora > 0
        ? t.capacidad_hora : getCapDash(proc, met);
      const he = und > 0 ? und / cap : 0;

      if (!porProc[proc]) porProc[proc] = { und:0, tareas:0, ops:{} };
      porProc[proc].und += und;
      porProc[proc].tareas++;

      const opId = c.operario_id;
      if (!porProc[proc].ops[opId]) {
        porProc[proc].ops[opId] = { nombre: c.operario_nombre||opId, und:0, he:0, n:0 };
      }
      porProc[proc].ops[opId].und += und;
      porProc[proc].ops[opId].he += he;
      porProc[proc].ops[opId].n++;
    });
  });

  if (!Object.keys(porProc).length) {
    cont.innerHTML = '<div class="empty">Sin datos para este período.</div>';
    return;
  }

  // Ordenar procesos por volumen
  const ordered = [...PROC_ORDER, ...Object.keys(porProc).filter(p => !PROC_ORDER.includes(p))];
  const procsConData = ordered.filter(p => porProc[p]);

  const medals = ['🥇','🥈','🥉'];

  cont.innerHTML = procsConData.map(proc => {
    const d = porProc[proc];
    const color = PROC_COLORS_D[proc] || '#6B6B6A';
    const esMaq = proc.includes('Máq') || proc.includes('maquina');
    const esRap = PROCESOS_RAPIDOS.includes(proc);
    const icon = esMaq ? '⚙' : esRap ? '⚡' : '✋';

    // Ranking de operarios en este proceso
    const ranking = Object.entries(d.ops)
      .map(([id, op]) => ({ id, ...op }))
      .sort((a,b) => b.und - a.und);
    const maxUnd = ranking[0]?.und || 1;

    const rankingHtml = ranking.map((op, i) => {
      const opColor = OP_COLORS[op.id] || '#6B6B6A';
      const ini = (op.nombre||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const pct = Math.round((op.und / maxUnd) * 100);
      return `<div class="op-rank-row">
        <div class="op-rank-medal">${medals[i] || ''}</div>
        <div class="op-rank-av" style="background:${opColor}">${ini}</div>
        <div class="op-rank-name">${(op.nombre||'').split(' ').slice(0,2).join(' ')}</div>
        <div class="op-rank-bar-wrap">
          <div class="op-rank-bar" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="op-rank-und">${op.und.toLocaleString()} und</div>
        <div class="op-rank-he">${op.he.toFixed(1)}h ef.</div>
      </div>`;
    }).join('');

    return `<div class="proc-block" id="pb_${proc}" onclick="toggleProcBlock('${proc}')">
      <!-- CABEZA: resumen compacto en tarjeta -->
      <div class="proc-block-head" style="flex-direction:column;align-items:flex-start;gap:8px;padding:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:22px">${icon}</span>
            <span class="proc-block-name" style="color:${color};font-size:15px">${proc.toUpperCase()}</span>
          </div>
          <div class="proc-block-arrow" style="color:${color}">▼</div>
        </div>
        <div style="width:100%">
          <div style="font-family:var(--mono);font-size:26px;font-weight:700;color:${color};line-height:1">${d.und.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--gray);margin-top:3px">${d.tareas} tareas · ${ranking.length} operario${ranking.length!==1?'s':''}</div>
        </div>
        <!-- Mini ranking preview (top 3) -->
        <div style="width:100%;display:flex;flex-direction:column;gap:4px">
          ${ranking.slice(0,3).map((op,i)=>{
            const opColor = OP_COLORS[op.id]||'#6B6B6A';
            const ini = (op.nombre||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            const pct = Math.round((op.und/maxUnd)*100);
            return `<div style="display:flex;align-items:center;gap:6px;font-size:11px">
              <span>${medals[i]||''}</span>
              <div style="width:20px;height:20px;border-radius:50%;background:${opColor};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">${ini}</div>
              <span style="flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(op.nombre||'').split(' ')[0]}</span>
              <span style="font-family:var(--mono);font-weight:700;color:${color};font-size:11px">${op.und.toLocaleString()}</span>
            </div>`;
          }).join('')}
          ${ranking.length > 3 ? `<div style="font-size:10px;color:var(--gray-l);text-align:center;margin-top:2px">+ ${ranking.length-3} más · clic para ver todos</div>` : ''}
        </div>
      </div>
      <!-- BODY: ranking completo al expandir -->
      <div class="proc-block-body" id="pbb_${proc}" style="padding:14px 16px">
        <div style="font-size:10px;font-weight:800;letter-spacing:1px;color:${color};text-transform:uppercase;margin-bottom:10px;border-bottom:2px solid ${color}20;padding-bottom:6px">Ranking completo · ${proc}</div>
        ${rankingHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleProcBlock(proc) {
  const block = document.getElementById(`pb_${proc}`);
  if (!block) return;
  block.classList.toggle('expanded');
}

</script>
